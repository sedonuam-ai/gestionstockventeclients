<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SAME GLOBAL SERVICES — Gestion Stock · Ventes</title>
<meta name="description" content="Application de gestion de stock et de ventes — SAME GLOBAL SERVICES" />
<meta name="theme-color" content="#1F4D3A" />

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/favicon.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SAME GS Stock" />

<style>
  :root{
    --paper:#EDEADD; --panel:#F7F4EA; --border:#D8D2B8; --ink:#1B2A3D;
    --green:#1F4D3A; --green-dark:#173B2C; --ochre:#C98A2B; --ochre-dark:#B57A20;
    --rust:#A63D2F; --rust-dark:#87301F; --muted:#8A8266; --muted2:#8A8266;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace; }
  .slab{ font-family:Georgia,"Times New Roman",serif; font-weight:700; }

  #app{ display:flex; min-height:100vh; }

  /* Sidebar */
  #sidebar{
    width:260px; flex-shrink:0; background:var(--ink); color:var(--paper);
    display:flex; flex-direction:column; position:fixed; top:0; bottom:0; left:0;
    transform:translateX(0); transition:transform .25s ease; z-index:40;
  }
  #sidebar.closed{ transform:translateX(-100%); }
  .brand{ padding:22px 20px; border-bottom:1px solid rgba(255,255,255,.1); }
  .brand .eyebrow{ font-size:10px; letter-spacing:.25em; color:var(--ochre); font-weight:700; margin-bottom:6px; }
  .brand h1{ font-size:19px; line-height:1.25; margin:0; }
  .brand .sub{ font-size:11px; color:#c9c4ae; margin-top:6px; }
  .brand-row{ display:flex; align-items:center; gap:10px; }
  .brand-logo{ width:34px; height:34px; border-radius:8px; flex-shrink:0; }

  nav{ flex:1; overflow-y:auto; padding:10px 0; }
  .grp-label{ padding:7px 20px; font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; background:rgba(255,255,255,.04); }
  .navlist{ list-style:none; margin:0; padding:0; }
  .navlink{
    width:100%; display:flex; align-items:center; gap:10px; padding:9px 20px;
    font-size:13.5px; text-align:left; border:0; border-left:4px solid transparent;
    background:transparent; color:#c9c4ae; cursor:pointer;
  }
  .navlink:hover{ background:rgba(255,255,255,.05); color:#fff; }
  .navlink.active{ border-left-color:var(--ochre); background:rgba(255,255,255,.1); color:#fff; font-weight:600; }
  .navlink svg{ flex-shrink:0; }
  .sidebar-foot{ padding:12px 20px; border-top:1px solid rgba(255,255,255,.1); font-size:10px; color:#8a8672; }

  /* Main */
  #main{ flex:1; margin-left:260px; padding:28px; min-height:100vh; }
  .maxw{ max-width:920px; margin:0 auto; }
  .topbar{ display:none; align-items:center; gap:12px; margin-bottom:16px; }
  #menuBtn{ background:var(--ink); color:var(--paper); border:0; border-radius:8px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

  header.section-head{ margin-bottom:22px; }
  .stamp{ display:inline-block; transform:rotate(-3deg); border:2px solid var(--green); color:var(--green); border-radius:3px; padding:2px 8px; font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; opacity:.85; }
  h1.title{ font-size:24px; margin:10px 0 0; }

  .panel{ background:var(--panel); border:1px solid var(--border); border-radius:8px; margin-bottom:24px; box-shadow:0 1px 2px rgba(0,0,0,.03); }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; border-bottom:1px solid var(--border); padding:14px 20px; flex-wrap:wrap; }
  .panel-eyebrow{ font-size:10px; text-transform:uppercase; letter-spacing:.2em; color:var(--ochre-dark); font-weight:700; margin-bottom:2px; }
  .panel-title{ font-size:17px; font-weight:700; margin:0; }
  .panel-body{ padding:20px; }

  .field{ display:block; margin-bottom:0; }
  .field .lbl{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#5c5646; font-weight:600; margin-bottom:5px; }
  .input, select.input{
    width:100%; background:#F7F4EA; border:1px solid #C9C2A8; border-radius:6px; padding:9px 11px;
    color:var(--ink); font-family:ui-monospace,monospace; font-size:13.5px;
  }
  .input:focus{ outline:2px solid var(--green); outline-offset:1px; border-color:var(--green); }
  .input:disabled{ opacity:.6; }

  .grid{ display:grid; gap:12px; }
  .grid-2{ grid-template-columns:repeat(2,1fr); }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-4{ grid-template-columns:repeat(4,1fr); }
  @media(max-width:700px){ .grid-2,.grid-3,.grid-4{ grid-template-columns:1fr; } }

  .btn{ display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:6px; font-size:13.5px; font-weight:600; border:0; cursor:pointer; transition:background .15s; }
  .btn-primary{ background:var(--green); color:#F3EFE2; } .btn-primary:hover{ background:var(--green-dark); }
  .btn-danger{ background:var(--rust); color:#F3EFE2; } .btn-danger:hover{ background:var(--rust-dark); }
  .btn-ochre{ background:var(--ochre); color:#2A1B04; } .btn-ochre:hover{ background:var(--ochre-dark); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid rgba(27,42,61,.3); } .btn-ghost:hover{ background:rgba(27,42,61,.05); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }

  table.ledger{ width:100%; border-collapse:collapse; }
  table.ledger th{ font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ochre-dark); text-align:left; padding:8px 10px; border-bottom:2px solid var(--ink); }
  table.ledger td{ padding:8px 10px; border-bottom:1px solid var(--border); font-size:13px; }
  table.ledger tbody tr:hover{ background:#F0ECDC; }
  .tr-right{ text-align:right; }
  table.ledger tfoot td{ padding-top:12px; font-weight:700; }

  .kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  @media(max-width:700px){ .kpis{ grid-template-columns:repeat(2,1fr); } }
  .kpi{ background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .kpi .val{ font-family:ui-monospace,monospace; font-size:20px; font-weight:700; margin-top:8px; }
  .kpi .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-top:4px; }

  .empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:44px 0; color:var(--muted); gap:8px; text-align:center; }

  .note{ display:flex; gap:10px; background:rgba(166,61,47,.1); border:1px solid rgba(166,61,47,.3); border-radius:6px; padding:14px; margin-bottom:16px; color:#5c2318; font-size:13.5px; }
  .note.ochre{ background:rgba(201,138,43,.1); border-color:rgba(201,138,43,.3); color:#5c3d0f; }
  .box{ background:var(--paper); border-radius:6px; padding:14px; font-family:ui-monospace,monospace; font-size:13.5px; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px; }
  .modal{ background:var(--panel); border:1px solid var(--border); border-radius:8px; max-width:380px; width:100%; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,.2); }
  .modal h3{ margin:6px 0 8px; font-size:16px; display:flex; align-items:center; gap:8px; color:var(--rust); }
  .modal p{ font-size:13.5px; color:#3d3826; margin-bottom:18px; }
  .modal .actions{ display:flex; justify-content:flex-end; gap:8px; }

  #toast{ position:fixed; bottom:20px; right:20px; z-index:200; padding:12px 16px; border-radius:6px; font-size:13.5px; font-weight:600; box-shadow:0 6px 20px rgba(0,0,0,.2); display:none; }
  #toast.success{ background:var(--green); color:#F3EFE2; }
  #toast.error{ background:var(--rust); color:#F3EFE2; }

  a{ color:inherit; }

  @media(max-width:880px){
    #sidebar{ transform:translateX(-100%); }
    #sidebar.open{ transform:translateX(0); }
    #main{ margin-left:0; padding:18px; }
    .topbar{ display:flex; }
  }
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-row">
        <img src="icons/icon-192.png" class="brand-logo" alt="Logo" />
        <div>
          <div class="eyebrow">REGISTRE</div>
          <h1 class="slab">SAME GLOBAL<br/>SERVICES</h1>
        </div>
      </div>
      <div class="sub">Gestion Stock · Ventes</div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">Données enregistrées sur cet appareil — fonctionne hors connexion</div>
  </aside>

  <main id="main">
    <div class="topbar">
      <button id="menuBtn" aria-label="Menu">☰</button>
      <strong class="slab">SAME GLOBAL SERVICES</strong>
    </div>
    <div class="maxw" id="content"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
